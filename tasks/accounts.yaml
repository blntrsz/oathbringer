- name: Install account and access packages
  ansible.builtin.package:
    name:
      - fzf
      - mosh
      - sudo
      - zsh
    state: present
  tags: accounts

- name: Check bootstrap SSH keys
  ansible.builtin.stat:
    path: "{{ bootstrap_authorized_keys_path }}"
  register: bootstrap_authorized_keys
  tags: accounts

- name: Require bootstrap SSH keys
  ansible.builtin.assert:
    that:
      - bootstrap_authorized_keys.stat.exists
      - bootstrap_authorized_keys.stat.size | default(0) | int > 0
    fail_msg: "No SSH keys found at {{ bootstrap_authorized_keys_path }}; refusing to disable root SSH."
  tags: accounts

- name: Create admin account
  ansible.builtin.user:
    name: "{{ admin_user }}"
    home: "{{ admin_home }}"
    shell: /bin/bash
    groups: sudo
    append: false
    create_home: true
    password: "!"
  tags: accounts

- name: Create developer account
  ansible.builtin.user:
    name: "{{ dev_user }}"
    home: "{{ dev_home }}"
    shell: /usr/bin/zsh
    groups: ""
    append: false
    create_home: true
    password: "!"
  tags: accounts

- name: Create developer config directory
  ansible.builtin.file:
    path: "{{ dev_home }}/.config"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
  tags: accounts

- name: Create SSH directories
  ansible.builtin.file:
    path: "{{ item.home }}/.ssh"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0700"
  loop:
    - user: "{{ admin_user }}"
      home: "{{ admin_home }}"
    - user: "{{ dev_user }}"
      home: "{{ dev_home }}"
  tags: accounts

- name: Install bootstrap SSH keys
  ansible.builtin.copy:
    src: "{{ bootstrap_authorized_keys_path }}"
    remote_src: true
    dest: "{{ item.home }}/.ssh/authorized_keys"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0600"
  loop:
    - user: "{{ admin_user }}"
      home: "{{ admin_home }}"
    - user: "{{ dev_user }}"
      home: "{{ dev_home }}"
  tags: accounts

- name: Configure passwordless admin sudo
  ansible.builtin.copy:
    content: "{{ admin_user }} ALL=(ALL:ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ admin_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  tags: accounts

- name: Ensure SSH configuration directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: accounts

- name: Enable SSH configuration drop-ins
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/\*\.conf\s*$'
    line: Include /etc/ssh/sshd_config.d/*.conf
    insertbefore: BOF
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload SSH
  tags: accounts

- name: Restrict SSH access to admin and dev
  ansible.builtin.copy:
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      AllowUsers {{ admin_user }} {{ dev_user }}
    dest: /etc/ssh/sshd_config.d/10-oathbringer-accounts.conf
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload SSH
  tags: accounts
