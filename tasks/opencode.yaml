- name: Check OpenCode availability
  ansible.builtin.stat:
    path: "{{ dev_home }}/.opencode/bin/opencode"
  register: opencode_binary

- name: Install OpenCode # noqa command-instead-of-module
  become: true
  become_user: "{{ dev_user }}"
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://opencode.ai/install | bash
    executable: /bin/bash
  environment:
    HOME: "{{ dev_home }}"
  when: not opencode_binary.stat.exists
  changed_when: true
