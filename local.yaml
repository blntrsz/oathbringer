- name: Provision OathBringer server
  hosts: localhost
  connection: local
  become: true
  vars:
    admin_user: admin
    admin_home: /home/admin
    dev_user: dev
    dev_home: /home/dev
    bootstrap_authorized_keys_path: /root/.ssh/authorized_keys
  pre_tasks:
    - name: Update and upgrade system packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
  tasks:
    - name: Configure accounts and remote access
      ansible.builtin.import_tasks: tasks/accounts.yaml
    - name: Install Neovim
      ansible.builtin.import_tasks: tasks/neovim.yaml
    - name: Install Bun
      ansible.builtin.import_tasks: tasks/bun.yaml
    - name: Install OpenCode
      ansible.builtin.import_tasks: tasks/opencode.yaml
    - name: Install Herdr
      ansible.builtin.import_tasks: tasks/herdr.yaml
    - name: Install fnm
      ansible.builtin.import_tasks: tasks/fnm.yaml
    - name: Configure Zsh
      ansible.builtin.import_tasks: tasks/zsh.yaml
  handlers:
    - name: Reload SSH
      ansible.builtin.service:
        name: ssh
        state: reloaded
