- name: Provision OathBringer server
  hosts: localhost
  connection: local
  become: true
  vars:
    admin_user: admin
    admin_home: /home/admin
    dev_user: dev
    dev_home: /home/dev
    bootstrap_authorized_keys_path: /root/.ssh/authorized_keys
  vars_prompt:
    - name: opencode_server_password
      prompt: OpenCode server password
      private: true
      confirm: true
  pre_tasks:
    - name: Require OpenCode server password
      ansible.builtin.assert:
        that:
          - opencode_server_password | length > 0
        fail_msg: OpenCode server password must not be empty.
    - name: Update and upgrade system packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
  tasks:
    - name: Configure accounts and remote access
      ansible.builtin.import_tasks: tasks/accounts.yaml
    - name: Install Docker and Docker Compose
      ansible.builtin.import_tasks: tasks/docker.yaml
    - name: Install GitHub CLI
      ansible.builtin.import_tasks: tasks/github-cli.yaml
    - name: Install Neovim
      ansible.builtin.import_tasks: tasks/neovim.yaml
    - name: Install Bun
      ansible.builtin.import_tasks: tasks/bun.yaml
    - name: Install OpenCode
      ansible.builtin.import_tasks: tasks/opencode.yaml
    - name: Configure OpenCode service with PM2
      ansible.builtin.import_tasks: tasks/pm2.yaml
    - name: Install Herdr
      ansible.builtin.import_tasks: tasks/herdr.yaml
    - name: Install Moshi
      ansible.builtin.import_tasks: tasks/moshi.yaml
    - name: Install fnm
      ansible.builtin.import_tasks: tasks/fnm.yaml
    - name: Configure Zsh
      ansible.builtin.import_tasks: tasks/zsh.yaml
  handlers:
    - name: Reload SSH
      ansible.builtin.service:
        name: ssh
        state: reloaded
